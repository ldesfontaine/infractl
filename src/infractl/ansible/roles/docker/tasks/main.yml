---
- name: Prérequis apt
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg, python3-apt]
    state: present
    update_cache: true

- name: Répertoire des clés apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Clé GPG du dépôt Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Dépôt apt Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Docker Engine + plugin Compose
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
    state: present
    update_cache: true

- name: Service docker démarré et activé
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
