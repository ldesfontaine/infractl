---
- name: Prérequis apt
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg, python3-apt, python3-debian]
    state: present
    update_cache: true

- name: Répertoire des clés apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Clé GPG du dépôt Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Dépôt apt Docker (format deb822)
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/debian
    suites: "{{ ansible_distribution_release }}"
    components: stable
    architectures: "{{ docker_apt_arch }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Docker Engine + plugin Compose
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
    state: present
    update_cache: true

- name: Service docker démarré et activé
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
